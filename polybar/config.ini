[global/wm]

margin-bottom = 0
margin-top = 0

include-file = modules.ini


[colors]

background = #00

background-alt = #373B41

foreground = #73c5f4

primary = #59bf6c

secondary = #8ABEB7

alert = #A54242

disabled = #707880


[bar/top]
width = 100%

height = 15pt

radius = 6


; dpi = 96


background = ${colors.background}

foreground = ${colors.foreground}


line-size = 3pt


border-size = 4pt

border-color = #00000000


padding-left = 1

padding-right = 2


module-margin = 1


separator = |

separator-foreground = ${colors.primary}


font-0 = "FantasqueSansMNerdFontPropo:size=11:weight=bold;2"

modules-right = pulseaudio bluetooth cpu
modules-left = powermenu blank title ewhm

modules-center = date




cursor-click = pointer

cursor-scroll = ns-resize


enable-ipc = true


; wm-restack = generic

; wm-restack = bspwm

; wm-restack = i3


; override-redirect = true








; vim:ft=dosini



